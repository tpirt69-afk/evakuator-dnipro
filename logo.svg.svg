<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2caee6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f7fa8;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle (optional, can be removed for transparent) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#2caee6" stroke-width="2" opacity="0.1"/>
  
  <!-- Main tow truck icon / crane symbol -->
  <!-- Truck body -->
  <g filter="url(#shadowFilter)">
    <!-- Cabin (simplified geometric) -->
    <rect x="55" y="75" width="35" height="35" fill="#2caee6" rx="4"/>
    
    <!-- Cabin window -->
    <rect x="63" y="83" width="19" height="15" fill="#0e1316" rx="2" opacity="0.2"/>
    
    <!-- Truck bed/platform -->
    <rect x="92" y="85" width="50" height="22" fill="url(#brandGradient)" rx="2"/>
    
    <!-- Platform detail lines (perspective) -->
    <line x1="95" y1="85" x2="95" y2="107" stroke="#1f7fa8" stroke-width="1.5" opacity="0.5"/>
    <line x1="110" y1="85" x2="110" y2="107" stroke="#1f7fa8" stroke-width="1.5" opacity="0.5"/>
    <line x1="125" y1="85" x2="125" y2="107" stroke="#1f7fa8" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Crane/boom arm (dynamic upward) -->
    <line x1="95" y1="90" x2="130" y2="55" stroke="#2caee6" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Crane hook detail -->
    <circle cx="130" cy="50" r="4" fill="#2caee6"/>
    <path d="M 130 54 Q 135 58 133 68" stroke="#2caee6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Cable/rope suggestion -->
    <line x1="130" y1="54" x2="128" y2="70" stroke="#2caee6" stroke-width="1.5" opacity="0.6" stroke-dasharray="2,3"/>
    
    <!-- Wheels - back axle -->
    <circle cx="75" cy="115" r="8" fill="none" stroke="#2caee6" stroke-width="2.5"/>
    <circle cx="75" cy="115" r="4" fill="#2caee6" opacity="0.4"/>
    
    <!-- Wheels - front axle -->
    <circle cx="125" cy="115" r="8" fill="none" stroke="#2caee6" stroke-width="2.5"/>
    <circle cx="125" cy="115" r="4" fill="#2caee6" opacity="0.4"/>
    
    <!-- Speed lines / motion indicator (right side, dynamic) -->
    <line x1="160" y1="95" x2="175" y2="95" stroke="#ffb020" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="160" y1="105" x2="172" y2="105" stroke="#ffb020" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="160" y1="115" x2="170" y2="115" stroke="#ffb020" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Minimal ground line -->
    <line x1="45" y1="125" x2="155" y2="125" stroke="#2caee6" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Decorative pulse circle (very subtle) -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#2caee6" stroke-width="1" opacity="0.2"/>
</svg>
